  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-serif;\n    background:\n      radial-gradient(820px 460px at 50% -160px, rgba(247, 147, 26, 0.10), transparent 70%),\n      var(--bg);\n    background-attachment: fixed;\n    color: var(--text);\n    min-height: 100vh;\n    -webkit-tap-highlight-color: transparent;\n    overscroll-behavior-y: none;\n  }\n\n  /* ── Header ─────────────────────────────── */\n  .topbar {\n    position: sticky; top: 0; z-index: 20;\n    padding: calc(var(--safe-t) + 12px) 18px 12px;\n    background: rgba(12, 10, 7, 0.82);\n    -webkit-backdrop-filter: saturate(140%) blur(18px);\n    backdrop-filter: saturate(140%) blur(18px);\n    border-bottom: 1px solid var(--border);\n    display: flex; align-items: center; gap: 10px;\n  }\n  .logo-icon {\n    width: 34px; height: 34px; flex: none; font-size: 19px;\n    background: linear-gradient(145deg, #FFAB3D, #E07F0A);\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 21px; font-weight: 700; color: #1A1206;\n    box-shadow: 0 0 22px rgba(247, 147, 26, 0.32), inset 0 1px 0 rgba(255,255,255,0.35);\n  }\n  .topbar-titles { flex: 1; min-width: 0; }\n  .topbar-title { font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n  .topbar-sub { font-size: 9.5px; color: var(--text3); letter-spacing: 0.09em; text-transform: uppercase; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n\n  .price-pill {\n    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;\n    cursor: pointer; flex: none;\n  }\n  .price-val { font-family: var(--mono); font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }\n  .price-meta { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }\n  .price-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }\n  .price-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }\n  .price-dot.err { background: var(--red); }\n  .spin { display: inline-block; animation: spin 0.9s linear infinite; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .lang-toggle {\n    display: flex; background: var(--inset); border: 1px solid var(--border2);\n    border-radius: 999px; overflow: hidden; flex: none;\n  }\n  .lang-btn {\n    border: none; background: transparent; color: var(--text3);\n    font-family: var(--mono); font-size: 11px; font-weight: 600;\n    padding: 6px 9px; cursor: pointer; -webkit-appearance: none;\n  }\n  .lang-btn.active { background: var(--btc-soft); color: var(--btc); }\n\n  /* ── Layout ─────────────────────────────── */\n  .wrap { max-width: 640px; margin: 0 auto; padding: 18px 16px calc(var(--safe-b) + 40px); }\n\n  .card {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-lg);\n    padding: 20px 18px;\n    margin-bottom: 14px;\n  }\n  .card.hero { position: relative; overflow: hidden; border-color: var(--btc-border); background: linear-gradient(180deg, rgba(247,147,26,0.05), var(--card) 120px); }\n\n  .card-title {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.13em;\n    text-transform: uppercase; color: var(--text3);\n    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;\n  }\n  .card-title .ttip { margin-left: auto; font-weight: 500; letter-spacing: 0; text-transform: none; color: var(--text3); font-family: var(--mono); font-size: 11px; }\n\n  /* ── Fields ─────────────────────────────── */\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n  .field { display: flex; flex-direction: column; gap: 8px; }\n  .field + .field { margin-top: 14px; }\n  .grid-2 .field + .field { margin-top: 0; }\n  .field label {\n    font-size: 11px; color: var(--text2); letter-spacing: 0.04em; font-weight: 500;\n    display: flex; align-items: center; gap: 7px;\n  }\n  .input-wrap { position: relative; display: flex; align-items: center; }\n  .input-pre {\n    position: absolute; left: 15px; font-family: var(--mono); font-size: 16px;\n    color: var(--text3); pointer-events: none; font-weight: 500;\n  }\n  .field input {\n    font-family: var(--mono); font-size: 17px; font-weight: 500;\n    background: var(--inset); border: 1px solid var(--border2);\n    border-radius: var(--radius); color: var(--text);\n    padding: 14px 15px; width: 100%; min-height: 52px;\n    -webkit-appearance: none; appearance: none;\n    transition: border-color .15s, box-shadow .15s;\n    font-variant-numeric: tabular-nums;\n  }\n  .field input.has-pre { padding-left: 38px; }\n  .field input::placeholder { color: var(--text3); }\n  .field input:focus { outline: none; border-color: var(--btc); box-shadow: 0 0 0 3px rgba(247,147,26,0.16); }\n  .field-note { font-family: var(--mono); font-size: 11px; color: var(--text3); }\n  .field-note b { color: var(--text2); font-weight: 500; }\n\n  .auto-tag {\n    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase;\n    color: var(--btc); background: var(--btc-soft); border: 1px solid var(--btc-border);\n    border-radius: 999px; padding: 2px 8px; cursor: pointer;\n  }\n\n  /* ── Range slider ───────────────────────── */\n  .slider-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }\n  .slider-head .lbl { font-size: 13px; color: var(--text2); font-weight: 500; }\n  .ltv-badge {\n    font-family: var(--mono); font-size: 30px; font-weight: 600; color: var(--btc);\n    font-variant-numeric: tabular-nums; line-height: 1;\n  }\n  input[type=range] {\n    -webkit-appearance: none; appearance: none; width: 100%; height: 32px;\n    background: transparent; cursor: pointer; margin: 0;\n  }\n  input[type=range]::-webkit-slider-runnable-track {\n    height: 8px; border-radius: 6px;\n    background: var(--inset); border: 1px solid var(--border2);\n  }\n  input[type=range]::-moz-range-track { height: 8px; border-radius: 6px; background: var(--inset); border: 1px solid var(--border2); }\n  input[type=range]::-webkit-slider-thumb {\n    -webkit-appearance: none; appearance: none;\n    width: 30px; height: 30px; margin-top: -12px; border-radius: 50%;\n    background: linear-gradient(145deg, #FFB14A, var(--btc));\n    border: 3px solid #1A1206;\n    box-shadow: 0 3px 10px rgba(0,0,0,0.45), 0 0 0 1px rgba(247,147,26,0.5);\n  }\n  input[type=range]::-moz-range-thumb {\n    width: 28px; height: 28px; border-radius: 50%;\n    background: linear-gradient(145deg, #FFB14A, var(--btc));\n    border: 3px solid #1A1206; box-shadow: 0 3px 10px rgba(0,0,0,0.45);\n  }\n  .scn-range::-webkit-slider-thumb { background: linear-gradient(145deg, #fff, #cfc7b8); }\n  .scn-range::-moz-range-thumb { background: linear-gradient(145deg, #fff, #cfc7b8); }\n\n  /* ── Results ────────────────────────────── */\n  .out-grid {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;\n    background: var(--border); border-radius: var(--radius);\n    overflow: hidden; border: 1px solid var(--border);\n  }\n  .out-cell { background: var(--card2); padding: 14px 15px; }\n  .out-cell.span { grid-column: 1 / -1; }\n  .out-label { font-size: 10.5px; color: var(--text3); letter-spacing: 0.04em; margin-bottom: 6px; text-transform: uppercase; }\n  .out-value { font-family: var(--mono); font-size: 19px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }\n  .out-value.sm { font-size: 16px; }\n\n  .health { margin-top: 16px; }\n  .health-head { display: flex; justify-content: space-between; align-items: baseline; font-family: var(--mono); font-size: 12px; color: var(--text3); margin-bottom: 11px; }\n  .health-head b { font-size: 15px; font-weight: 600; }\n  .ind-track-wrap { position: relative; padding-top: 3px; }\n  .ind-track { height: 12px; border-radius: 6px; overflow: hidden; background: var(--inset); position: relative; }\n  .ind-track .seg { position: absolute; top: 0; bottom: 0; }\n  .ind-marker { position: absolute; top: -1px; width: 4px; height: 18px; background: var(--text); border-radius: 2px; box-shadow: 0 0 0 2px rgba(12,10,7,0.92); }\n  .ind-scale { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 7px; }\n\n  /* ── Scenario ───────────────────────────── */\n  .scn-out { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: center; margin-top: 18px; }\n  .scn-cell .l { font-size: 10.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }\n  .scn-cell .v { font-family: var(--mono); font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }\n  .scn-chg.up { color: var(--green); }\n  .scn-chg.down { color: var(--red); }\n  .chip {\n    font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 6px 12px;\n    border-radius: 999px; border: 1px solid; white-space: nowrap; justify-self: end;\n  }\n  .chip-green { color: var(--green); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }\n  .chip-red { color: var(--red); border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }\n  .chip-orange { color: var(--btc); border-color: var(--btc-border); background: var(--btc-soft); }\n  .chip-gray { color: var(--text3); border-color: var(--border2); background: var(--inset); }\n  @media (max-width: 440px) {\n    .scn-out { grid-template-columns: 1fr 1fr; }\n    .scn-out .chip { grid-column: 1 / -1; justify-self: start; }\n  }\n\n  /* ── Collapsible ────────────────────────── */\n  .collapse-head {\n    display: flex; align-items: center; gap: 8px; cursor: pointer;\n    margin-bottom: 0; -webkit-tap-highlight-color: transparent;\n  }\n  .collapse-head .chev { margin-left: auto; color: var(--text3); transition: transform .2s; font-size: 13px; }\n  .card.open .collapse-head .chev { transform: rotate(180deg); }\n  .collapse-body { max-height: 0; overflow: hidden; transition: max-height .28s ease, margin-top .28s ease, opacity .2s; opacity: 0; }\n  .card.open .collapse-body { max-height: 420px; margin-top: 18px; opacity: 1; }\n\n  .disclaimer { text-align: center; font-size: 11px; color: var(--text3); line-height: 1.6; margin-top: 8px; padding: 0 6px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"topbar\">\n  <div class=\"logo-icon\">₿<\u002Fdiv>\n  <div class=\"topbar-titles\">\n    <div class=\"topbar-title\" id=\"t-title\">Simulador de empréstimo<\u002Fdiv>\n    <div class=\"topbar-sub\">Colateral em Bitcoin<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"price-pill\" id=\"price-pill\">\n    <div class=\"price-val\" id=\"btc-price\">—<\u002Fdiv>\n    <div class=\"price-meta\"><span class=\"price-dot\" id=\"price-dot\"><\u002Fspan><span id=\"price-status\">—<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"lang-toggle\">\n    <button class=\"lang-btn active\" data-lang=\"pt\" onclick=\"setLang('pt')\">PT<\u002Fbutton>\n    <button class=\"lang-btn\" data-lang=\"en\" onclick=\"setLang('en')\">EN<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main class=\"wrap\">\n\n  <!-- Colateral & preço -->\n  <section class=\"card\">\n    <div class=\"card-title\" id=\"t-sec-coll\">Colateral &amp; preço<\u002Fdiv>\n    <div class=\"grid-2\">\n      <div class=\"field\">\n        <label id=\"t-sl-coll\">Colateral BTC<\u002Flabel>\n        <div class=\"input-wrap\">\n          <span class=\"input-pre\">₿<\u002Fspan>\n          <input class=\"has-pre\" type=\"text\" inputmode=\"decimal\" id=\"sl-coll\" value=\"1\" oninput=\"recalcLoan('field')\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label id=\"t-sl-price\">Preço BTC (USD)<\u002Flabel>\n        <div class=\"input-wrap\">\n          <span class=\"input-pre\">$<\u002Fspan>\n          <input class=\"has-pre\" type=\"text\" inputmode=\"decimal\" id=\"sl-price\" placeholder=\"atual\" oninput=\"recalcLoan('field')\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"field-note\" style=\"margin-top:12px;\"><span id=\"t-collval\">Valor do colateral<\u002Fspan>: <b id=\"coll-value\">—<\u002Fb><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Empréstimo (hero) -->\n  <section class=\"card hero\">\n    <div class=\"card-title\" id=\"t-sec-loan\">Empréstimo<\u002Fdiv>\n    <div class=\"slider-head\">\n      <span class=\"lbl\" id=\"t-sl-ltv\">LTV alvo<\u002Fspan>\n      <span class=\"ltv-badge\" id=\"sl-ltv-val\">40%<\u002Fspan>\n    <\u002Fdiv>\n    <input type=\"range\" id=\"sl-ltv\" min=\"5\" max=\"90\" step=\"1\" value=\"40\" oninput=\"recalcLoan('slider')\">\n    <div class=\"field\" style=\"margin-top:18px;\">\n      <label id=\"t-sl-amount\">Valor emprestado (USD)<\u002Flabel>\n      <div class=\"input-wrap\">\n        <span class=\"input-pre\">$<\u002Fspan>\n        <input class=\"has-pre\" type=\"text\" inputmode=\"decimal\" id=\"sl-amount\" oninput=\"recalcLoan('amount')\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"out-grid\" id=\"loan-sim-out\" style=\"margin-top:18px;\"><\u002Fdiv>\n\n    <div class=\"health\">\n      <div class=\"health-head\"><span id=\"t-health\">Saúde do empréstimo<\u002Fspan><b id=\"health-val\">—<\u002Fb><\u002Fdiv>\n      <div id=\"health-track\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Parâmetros (collapsible) -->\n  <section class=\"card\" id=\"params-card\">\n    <div class=\"card-title collapse-head\" onclick=\"toggleParams()\">\n      <span id=\"t-sec-params\">Parâmetros<\u002Fspan>\n      <span class=\"ttip\" id=\"params-summary\"><\u002Fspan>\n      <span class=\"chev\">▾<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"collapse-body\">\n      <div class=\"grid-2\">\n        <div class=\"field\">\n          <label id=\"t-sl-apr\">Juros anual %<\u002Flabel>\n          <input type=\"text\" inputmode=\"decimal\" id=\"sl-apr\" value=\"2.5\" oninput=\"recalcLoan('field')\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label id=\"t-sl-term\">Prazo (meses)<\u002Flabel>\n          <input type=\"text\" inputmode=\"numeric\" id=\"sl-term\" value=\"12\" oninput=\"recalcLoan('field')\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label id=\"t-sl-mc\">LTV margin call %<\u002Flabel>\n          <input type=\"text\" inputmode=\"decimal\" id=\"sl-mc\" value=\"87.95\" oninput=\"recalcLoan('field')\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label id=\"t-sl-liq\">LTV liquidação %<\u002Flabel>\n          <input type=\"text\" inputmode=\"decimal\" id=\"sl-liq\" value=\"97.95\" oninput=\"recalcLoan('field')\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Cenários -->\n  <section class=\"card\">\n    <div class=\"card-title\" id=\"t-sl-scenarios\">Cenários de preço do BTC<\u002Fdiv>\n    <div class=\"slider-head\">\n      <span class=\"lbl\" id=\"t-scn-lab\">Variação de preço<\u002Fspan>\n      <span class=\"ltv-badge\" id=\"scn-pct-val\" style=\"font-size:26px;\">0%<\u002Fspan>\n    <\u002Fdiv>\n    <input type=\"range\" class=\"scn-range\" id=\"scn-pct\" min=\"-90\" max=\"150\" step=\"1\" value=\"0\" oninput=\"renderScenario()\">\n    <div class=\"scn-out\" id=\"loan-scenarios\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <p class=\"disclaimer\" id=\"t-disc\">Apenas simulação. Nada é registrado. Não é aconselhamento financeiro.<\u002Fp>\n\n<\u002Fmain>\n\n\n\n<script>\n/* ── i18n ───────────────────────────────── */\nconst I18N = {\n  pt: {\n    title: 'Simulador de empréstimo',\n    secColl: 'Colateral & preço', collval: 'Valor do colateral',\n    slColl: 'Colateral BTC', slPrice: 'Preço BTC (USD)',\n    secLoan: 'Empréstimo', slLtv: 'LTV alvo', slAmount: 'Valor emprestado (USD)',\n    health: 'Saúde do empréstimo',\n    secParams: 'Parâmetros', slApr: 'Juros anual %', slTerm: 'Prazo (meses)',\n    slMc: 'LTV margin call %', slLiq: 'LTV liquidação %',\n    slOutAmount: 'Empréstimo', slOutLtv: 'LTV inicial', slOutLiq: 'Preço de liquidação',\n    slOutMc: 'Preço de margin call', slOutDist: 'Distância à liquidação',\n    slOutInt: 'Juros no período', slOutTotal: 'Total a pagar', slOutMonthly: 'Juros / mês',\n    slScenarios: 'Cenários de preço do BTC', scnVar: 'Variação de preço',\n    scnChange: 'Variação', scnPrice: 'Preço BTC', scnLtv: 'LTV',\n    scnHealthy: 'saudável', scnMargin: 'margin call', scnLiq: 'liquidado',\n    disc: 'Apenas simulação. Nada é registrado. Não é aconselhamento financeiro.',\n    locale: 'pt-BR', now: 'agora', err: 'erro', updating: 'atualizando…',\n    pSummary: (apr, term) => apr + '% a.a · ' + term + 'm'\n  },\n  en: {\n    title: 'Loan simulator',\n    secColl: 'Collateral & price', collval: 'Collateral value',\n    slColl: 'BTC collateral', slPrice: 'BTC price (USD)',\n    secLoan: 'Loan', slLtv: 'Target LTV', slAmount: 'Borrowed (USD)',\n    health: 'Loan health',\n    secParams: 'Parameters', slApr: 'Annual interest %', slTerm: 'Term (months)',\n    slMc: 'Margin call LTV %', slLiq: 'Liquidation LTV %',\n    slOutAmount: 'Loan', slOutLtv: 'Initial LTV', slOutLiq: 'Liquidation price',\n    slOutMc: 'Margin call price', slOutDist: 'Distance to liquidation',\n    slOutInt: 'Interest (term)', slOutTotal: 'Total to repay', slOutMonthly: 'Interest / mo',\n    slScenarios: 'BTC price scenarios', scnVar: 'Price change',\n    scnChange: 'Change', scnPrice: 'BTC price', scnLtv: 'LTV',\n    scnHealthy: 'healthy', scnMargin: 'margin call', scnLiq: 'liquidated',\n    disc: 'Simulation only. Nothing is saved. Not financial advice.',\n    locale: 'en-US', now: 'now', err: 'error', updating: 'updating…',\n    pSummary: (apr, term) => apr + '%/yr · ' + term + 'mo'\n  }\n};\nlet lang = 'pt';\ntry { lang = localStorage.getItem('btc_loan_lang') || 'pt'; } catch(e) {}\nif (!I18N[lang]) lang = 'pt';\nfunction t(k) { return I18N[lang][k]; }\n\n/* ── helpers ────────────────────────────── */\nfunction calcParseNum(v) {\n  const n = parseFloat(String(v).replace(/\\s/g, '').replace(',', '.'));\n  return isNaN(n) ? 0 : n;\n}\nfunction fUSD0(v) { return '$ ' + Math.round(v).toLocaleString('en-US', { maximumFractionDigits: 0 }); }\n\nfunction indTrackHtml(min, max, val, segs, labels) {\n  const pct = Math.max(0, Math.min(100, (val - min) / (max - min) * 100));\n  const segHtml = segs.map(s => {\n    const l = Math.max(0, (s.from - min) / (max - min) * 100);\n    const r = Math.min(100, (s.to - min) / (max - min) * 100);\n    return '<div class=\"seg\" style=\"left:' + l + '%;width:' + (r - l) + '%;background:' + s.color + ';\"><\u002Fdiv>';\n  }).join('');\n  const lbl = labels && labels.length ? '<div class=\"ind-scale\">' + labels.map(x => '<span>' + x + '<\u002Fspan>').join('') + '<\u002Fdiv>' : '';\n  return '<div class=\"ind-track-wrap\"><div class=\"ind-track\">' + segHtml + '<\u002Fdiv><div class=\"ind-marker\" style=\"left:calc(' + pct.toFixed(2) + '% - 2px);\"><\u002Fdiv><\u002Fdiv>' + lbl;\n}\n\n/* ── persistence ────────────────────────── */\nconst FIELDS = ['sl-coll', 'sl-price', 'sl-apr', 'sl-term', 'sl-mc', 'sl-liq', 'sl-ltv'];\nfunction saveState() {\n  try {\n    const s = {};\n    FIELDS.forEach(id => { s[id] = document.getElementById(id).value; });\n    s.scn = document.getElementById('scn-pct').value;\n    localStorage.setItem('btc_loan_sim', JSON.stringify(s));\n  } catch (e) {}\n}\nfunction loadState() {\n  try {\n    const s = JSON.parse(localStorage.getItem('btc_loan_sim') || '{}');\n    FIELDS.forEach(id => { if (s[id] != null && s[id] !== '') document.getElementById(id).value = s[id]; });\n    if (s.scn != null) document.getElementById('scn-pct').value = s.scn;\n  } catch (e) {}\n}\n\n/* ── loan simulator ─────────────────────── */\nlet loanAmount = 0;\nfunction recalcLoan(src) {\n  const g = id => document.getElementById(id);\n  if (!g('sl-coll')) return;\n  const coll = calcParseNum(g('sl-coll').value);\n  const price = calcParseNum(g('sl-price').value);\n  const apr = calcParseNum(g('sl-apr').value);\n  const term = calcParseNum(g('sl-term').value);\n  const mc = calcParseNum(g('sl-mc').value) || 75;\n  const liq = calcParseNum(g('sl-liq').value) || 85;\n  const collValue = coll * price;\n  let ltv;\n  if (src === 'amount') {\n    loanAmount = calcParseNum(g('sl-amount').value);\n    ltv = collValue > 0 ? loanAmount / collValue * 100 : 0;\n    g('sl-ltv').value = Math.max(5, Math.min(90, Math.round(ltv) || 5));\n  } else {\n    ltv = calcParseNum(g('sl-ltv').value);\n    loanAmount = collValue * ltv / 100;\n    if (document.activeElement !== g('sl-amount')) g('sl-amount').value = loanAmount > 0 ? loanAmount.toFixed(2) : '';\n  }\n  g('sl-ltv-val').textContent = (ltv || 0).toFixed(0) + '%';\n  const cv = g('coll-value');\n  if (cv) cv.textContent = collValue > 0 ? fUSD0(collValue) : '—';\n  const ps = g('params-summary');\n  if (ps) ps.textContent = t('pSummary')(apr || 0, term || 0);\n  renderLoanSim(coll, price, loanAmount, ltv, apr, term, mc, liq);\n  renderScenario();\n  saveState();\n}\n\nfunction renderLoanSim(coll, price, amount, ltv, apr, term, mc, liq) {\n  const out = document.getElementById('loan-sim-out');\n  if (!out) return;\n  const ok = coll > 0 && price > 0 && amount > 0;\n  const liqPrice = (coll > 0 && liq > 0) ? amount / (coll * (liq / 100)) : 0;\n  const mcPrice  = (coll > 0 && mc > 0) ? amount / (coll * (mc / 100)) : 0;\n  const dist = (price > 0 && liqPrice > 0) ? (price - liqPrice) / price * 100 : 0;\n  const interest = amount * (apr / 100) * (term / 12);\n  const total = amount + interest;\n  const monthly = amount * (apr / 100) / 12;\n  const ltvCol = ltv >= liq ? 'var(--red)' : ltv >= mc ? 'var(--btc)' : 'var(--green)';\n  const distCol = dist < 20 ? 'var(--red)' : dist < 40 ? 'var(--btc)' : 'var(--green)';\n  const cell = (lab, val, style, span, sm) =>\n    '<div class=\"out-cell' + (span ? ' span' : '') + '\"><div class=\"out-label\">' + lab + '<\u002Fdiv>'\n    + '<div class=\"out-value' + (sm ? ' sm' : '') + '\"' + (style ? ' style=\"' + style + '\"' : '') + '>' + val + '<\u002Fdiv><\u002Fdiv>';\n  out.innerHTML =\n      cell(t('slOutAmount'), ok ? fUSD0(amount) : '—', 'color:var(--btc)')\n    + cell(t('slOutLtv'), ok ? ltv.toFixed(1) + '%' : '—', 'color:' + ltvCol)\n    + cell(t('slOutLiq'), ok ? fUSD0(liqPrice) : '—', 'color:var(--red)')\n    + cell(t('slOutMc'), ok ? fUSD0(mcPrice) : '—', 'color:var(--btc)')\n    + cell(t('slOutDist'), ok ? '−' + dist.toFixed(1) + '%' : '—', 'color:' + distCol)\n    + cell(t('slOutInt'), ok ? fUSD0(interest) : '—', '', false, true)\n    + cell(t('slOutMonthly'), ok ? fUSD0(monthly) : '—', '', false, true)\n    + cell(t('slOutTotal'), ok ? fUSD0(total) : '—', '', false, true);\n\n  const hv = document.getElementById('health-val');\n  if (hv) { hv.textContent = ok ? ltv.toFixed(1) + '%' : '—'; hv.style.color = ltvCol; }\n  const segs = [\n    { from: 0, to: mc, color: 'rgba(74,222,128,0.5)' },\n    { from: mc, to: liq, color: 'rgba(247,147,26,0.5)' },\n    { from: liq, to: 100, color: 'rgba(248,113,113,0.55)' }\n  ];\n  const ht = document.getElementById('health-track');\n  if (ht) ht.innerHTML = indTrackHtml(0, 100, Math.max(0, Math.min(100, ltv || 0)), segs, ['0%', mc + '%', liq + '%', '100%']);\n}\n\nfunction renderScenario() {\n  const el = document.getElementById('loan-scenarios');\n  if (!el) return;\n  const g = id => document.getElementById(id);\n  const coll = calcParseNum(g('sl-coll').value);\n  const price = calcParseNum(g('sl-price').value);\n  const mc = calcParseNum(g('sl-mc').value) || 75;\n  const liq = calcParseNum(g('sl-liq').value) || 85;\n  const pct = calcParseNum(g('scn-pct').value);\n  const pv = g('scn-pct-val');\n  if (pv) pv.textContent = (pct > 0 ? '+' : '') + pct.toFixed(0) + '%';\n  const ok = coll > 0 && price > 0 && loanAmount > 0;\n  const np = price * (1 + pct / 100);\n  const ltv = (np > 0 && coll > 0) ? loanAmount / (coll * np) * 100 : 0;\n  const st = !ok ? ['chip-gray', '—']\n    : ltv >= liq ? ['chip-red', t('scnLiq')]\n    : ltv >= mc ? ['chip-orange', t('scnMargin')]\n    : ['chip-green', t('scnHealthy')];\n  const chgCls = pct > 0 ? 'up' : pct < 0 ? 'down' : '';\n  el.innerHTML =\n      '<div class=\"scn-cell\"><div class=\"l\">' + t('scnChange') + '<\u002Fdiv><div class=\"v scn-chg ' + chgCls + '\">' + (pct > 0 ? '+' : '') + pct.toFixed(0) + '%<\u002Fdiv><\u002Fdiv>'\n    + '<div class=\"scn-cell\"><div class=\"l\">' + t('scnPrice') + '<\u002Fdiv><div class=\"v\">' + (ok ? fUSD0(np) : '—') + '<\u002Fdiv><\u002Fdiv>'\n    + '<div class=\"scn-cell\"><div class=\"l\">' + t('scnLtv') + '<\u002Fdiv><div class=\"v\" style=\"color:' + (ok ? (ltv >= liq ? 'var(--red)' : ltv >= mc ? 'var(--btc)' : 'var(--green)') : 'var(--text)') + '\">' + (ok ? ltv.toFixed(1) + '%' : '—') + '<\u002Fdiv><\u002Fdiv>'\n    + '<span class=\"chip ' + st[0] + '\">' + st[1] + '<\u002Fspan>';\n  saveState();\n}\n\n/* ── language ───────────────────────────── */\nfunction setLang(l) {\n  lang = I18N[l] ? l : 'pt';\n  try { localStorage.setItem('btc_loan_lang', lang); } catch (e) {}\n  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';\n  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));\n  applyLang();\n}\nfunction applyLang() {\n  const set = (id, key) => { const e = document.getElementById(id); if (e) e.textContent = t(key); };\n  set('t-title', 'title');\n  set('t-sec-coll', 'secColl'); set('t-collval', 'collval');\n  set('t-sl-coll', 'slColl'); set('t-sl-price', 'slPrice');\n  set('t-sec-loan', 'secLoan'); set('t-sl-ltv', 'slLtv'); set('t-sl-amount', 'slAmount'); set('t-health', 'health');\n  set('t-sec-params', 'secParams'); set('t-sl-apr', 'slApr'); set('t-sl-term', 'slTerm'); set('t-sl-mc', 'slMc'); set('t-sl-liq', 'slLiq');\n  set('t-sl-scenarios', 'slScenarios'); set('t-scn-lab', 'scnVar');\n  set('t-disc', 'disc');\n  recalcLoan('slider');\n}\n\n/* ── collapsible ────────────────────────── */\nfunction toggleParams() {\n  const c = document.getElementById('params-card');\n  const open = c.classList.toggle('open');\n  try { localStorage.setItem('btc_loan_params_open', open ? '1' : '0'); } catch (e) {}\n}\n\n/* ── price feed ─────────────────────────── */\nasync function fetchT(url, ms = 8000) {\n  const ctl = new AbortController();\n  const id = setTimeout(() => ctl.abort(), ms);\n  try {\n    const r = await fetch(url, { signal: ctl.signal });\n    if (!r.ok) throw new Error('http ' + r.status);\n    return await r.json();\n  } finally { clearTimeout(id); }\n}\nasync function fetchPrice() {\n  const el = document.getElementById('btc-price');\n  const status = document.getElementById('price-status');\n  const dot = document.getElementById('price-dot');\n  el.innerHTML = '<span class=\"spin\">↻<\u002Fspan>';\n  dot.className = 'price-dot';\n  const sources = [\n    { name: 'Binance', fn: async () => { const d = await fetchT('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'); return parseFloat(d.price); } },\n    { name: 'Coinbase', fn: async () => { const d = await fetchT('https://api.coinbase.com/v2/prices/BTC-USD/spot'); return parseFloat(d.data.amount); } },\n    { name: 'Kraken', fn: async () => { const d = await fetchT('https://api.kraken.com/0/public/Ticker?pair=XBTUSD'); const k = Object.keys(d.result)[0]; return parseFloat(d.result[k].c[0]); } },\n    { name: 'CoinGecko', fn: async () => { const d = await fetchT('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd'); return d.bitcoin.usd; } },\n  ];\n  for (const s of sources) {\n    try {\n      const p = await s.fn();\n      if (!p || isNaN(p)) continue;\n      btcPriceUSD = p;\n      el.textContent = '$ ' + btcPriceUSD.toLocaleString('en-US', { maximumFractionDigits: 0 });\n      status.textContent = s.name + ' · ' + new Date().toLocaleTimeString(t('locale'), { hour: '2-digit', minute: '2-digit' });\n      dot.className = 'price-dot live';\n      const pEl = document.getElementById('sl-price');\n      if (pEl && !pEl.value) { pEl.value = Math.round(btcPriceUSD); recalcLoan('slider'); }\n      return;\n    } catch (e) {}\n  }\n  el.textContent = t('err');\n  status.textContent = '—';\n  dot.className = 'price-dot err';\n}\nlet btcPriceUSD = 0;\n\n/* ── init ───────────────────────────────── */\nloadState();\n(function () {\n  try { if (localStorage.getItem('btc_loan_params_open') === '1') document.getElementById('params-card').classList.add('open'); } catch (e) {}\n})();\ndocument.querySelector('#price-pill').addEventListener('click', fetchPrice);\nsetLang(lang);\nfetchPrice();\nsetInterval(fetchPrice, 60000);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
